<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mytram16 | Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
        }
        h1 { margin-bottom: 5px; }
        p { color: #e0e0e0; font-size: 14px; }
        .links a {
            display: block;
            background: white;
            color: #1f1c2c;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .links a:hover {
            transform: scale(1.05);
            background: #928dab;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Bro có thể đổi chữ tùy ý inside nhé -->
        <h1>Mỹ Trâm</h1>
        <p>Welcome to my personal space ✨</p>
        
        <div class="links">
            <!-- Thay link mạng xã hội hoặc dự án của bro vào đây -->
            <a href="https://facebook.com" target="_blank">Facebook</a>
            <a href="https://github.com/mytram16" target="_blank">My GitHub</a>
        </div>
    </div>
</body>
</html>
