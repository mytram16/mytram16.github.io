<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1150" viewBox="0 0 900 1150" role="img" aria-labelledby="title desc">
    <title id="title">Reusable portrait placeholder</title>
    <desc id="desc">A soft pink portrait placeholder with an abstract silhouette.</desc>
    <defs>
        <linearGradient id="bg" x1="115" y1="0" x2="785" y2="1150" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#fff8fb"/>
            <stop offset="0.48" stop-color="#ffeef6"/>
            <stop offset="1" stop-color="#ffd5e6"/>
        </linearGradient>
        <radialGradient id="halo" cx="50%" cy="28%" r="55%">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
            <stop offset="0.5" stop-color="#ff8ab4" stop-opacity="0.22"/>
            <stop offset="1" stop-color="#ff5f95" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="figure" x1="270" y1="250" x2="630" y2="970" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#ff8ab4"/>
            <stop offset="1" stop-color="#e54885"/>
        </linearGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
            <feDropShadow dx="0" dy="34" stdDeviation="36" flood-color="#ff5f95" flood-opacity="0.22"/>
            <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1d1d1f" flood-opacity="0.1"/>
        </filter>
    </defs>
    <rect width="900" height="1150" fill="url(#bg)"/>
    <circle cx="450" cy="330" r="360" fill="url(#halo)"/>
    <circle cx="205" cy="178" r="95" fill="#ffffff" opacity="0.48"/>
    <circle cx="725" cy="295" r="135" fill="#ff8ab4" opacity="0.16"/>
    <circle cx="690" cy="930" r="210" fill="#b55acb" opacity="0.1"/>
    <g filter="url(#softShadow)">
        <path d="M292 1002c19-166 91-269 158-269s139 103 158 269H292Z" fill="url(#figure)" opacity="0.9"/>
        <circle cx="450" cy="513" r="156" fill="url(#figure)" opacity="0.92"/>
        <path d="M303 520c28-133 105-226 207-226 93 0 158 71 184 182-51-47-119-75-194-75-84 0-159 37-197 119Z" fill="#1d1d1f" opacity="0.14"/>
    </g>
    <path d="M303 1018h294" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.52"/>
</svg>
